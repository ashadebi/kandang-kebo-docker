{% extends "base.html" %}
{% block content %}
<div class="panel">
  <h1>{{ "Edit Site" if site else "Create Site" }}</h1>
  <p class="muted">Panel akan membuat folder /home/$user, compose file, credential database, dan akun SFTP.</p>
  {% if error %}<div class="notice">{{ error }}</div>{% endif %}
  <form class="grid two" method="post" action="{{ '/sites/' ~ site.id ~ '/edit' if site and site.id else '/sites' }}">
    <label>Username
      <input name="username" placeholder="client1" value="{{ site.username if site else '' }}" {% if site and site.id %}readonly{% endif %} required>
    </label>
    <label>Domain
      <input name="domain" placeholder="client1.example.com" value="{{ site.domain if site else '' }}" required>
    </label>
    <label>PHP Version
      <select name="php_version">
        <optgroup label="PHP 5">
          <option value="5.6" {% if site and site.php_version == "5.6" %}selected{% endif %}>5.6 legacy</option>
        </optgroup>
        <optgroup label="PHP 7">
          <option value="7.0" {% if site and site.php_version == "7.0" %}selected{% endif %}>7.0</option>
          <option value="7.1" {% if site and site.php_version == "7.1" %}selected{% endif %}>7.1</option>
          <option value="7.2" {% if site and site.php_version == "7.2" %}selected{% endif %}>7.2</option>
          <option value="7.3" {% if site and site.php_version == "7.3" %}selected{% endif %}>7.3</option>
          <option value="7.4" {% if site and site.php_version == "7.4" %}selected{% endif %}>7.4</option>
        </optgroup>
        <optgroup label="PHP 8">
          <option value="8.0" {% if site and site.php_version == "8.0" %}selected{% endif %}>8.0</option>
          <option value="8.1" {% if site and site.php_version == "8.1" %}selected{% endif %}>8.1</option>
          <option value="8.2" {% if site and site.php_version == "8.2" %}selected{% endif %}>8.2</option>
          <option value="8.3" {% if not site or site.php_version == "8.3" %}selected{% endif %}>8.3</option>
          <option value="8.4" {% if site and site.php_version == "8.4" %}selected{% endif %}>8.4</option>
        </optgroup>
      </select>
    </label>
    <label>Database
      <select name="db_engine">
        <option value="mariadb" {% if not site or site.db_engine == "mariadb" %}selected{% endif %}>MariaDB</option>
      </select>
    </label>
    <label>CMS / Starter App
      <select name="cms_app">
        <option value="none" {% if not site or site.cms_app == "none" %}selected{% endif %}>Blank PHP site</option>
        <option value="wordpress" {% if site and site.cms_app == "wordpress" %}selected{% endif %}>WordPress</option>
        <option value="joomla" {% if site and site.cms_app == "joomla" %}selected{% endif %}>Joomla</option>
        <option value="drupal" {% if site and site.cms_app == "drupal" %}selected{% endif %}>Drupal</option>
      </select>
      <span class="muted">CMS populer tersedia untuk PHP 8.1 sampai 8.4.</span>
    </label>
    <label>Custom PHP/CMS Image
      <input name="custom_image" placeholder="registry/user/image:tag" value="{{ site.custom_image if site else '' }}">
      <span class="muted">Opsional. Jika diisi, image ini dipakai untuk service PHP dan public_html dipasang ke /var/www/html.</span>
    </label>
    <label>php.ini Preset
      <select name="php_ini_preset">
        <option value="standard" {% if not site or site.php_ini_preset == "standard" %}selected{% endif %}>Standard upload - 64M</option>
        <option value="large_upload" {% if site and site.php_ini_preset == "large_upload" %}selected{% endif %}>Large upload - 256M</option>
        <option value="very_large_upload" {% if site and site.php_ini_preset == "very_large_upload" %}selected{% endif %}>Very large upload - 1G</option>
      </select>
    </label>
    <label>Resource Limit
      <select name="resource_preset">
        <option value="small" {% if site and site.resource_preset == "small" %}selected{% endif %}>Small - low traffic</option>
        <option value="medium" {% if not site or site.resource_preset == "medium" %}selected{% endif %}>Medium - default</option>
        <option value="large" {% if site and site.resource_preset == "large" %}selected{% endif %}>Large - busy site</option>
      </select>
    </label>
    <label class="checkline">
      <input name="waf_enabled" type="checkbox" value="true" {% if site and site.waf_enabled %}checked{% endif %}>
      Enable Coraza WAF
    </label>
    <div class="actions">
      <button type="submit">{{ "Save Changes" if site else "Create" }}</button>
      <a class="button secondary" href="{{ '/sites/' ~ site.id if site and site.id else '/' }}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
