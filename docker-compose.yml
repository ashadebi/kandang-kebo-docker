version: "3.9"

services:
  traefik:
    image: traefik:v3.2
    container_name: hosting-traefik
    restart: unless-stopped
    userns_mode: "host"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - NET_RAW
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --experimental.plugins.coraza.modulename=github.com/jcchavezs/coraza-http-wasm-traefik
      - --experimental.plugins.coraza.version=v0.3.0
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data/letsencrypt:/letsencrypt
      - ./data/custom-certs:/custom-certs:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - hosting-public

  dashboard:
    build: .
    container_name: hosting-dashboard
    restart: unless-stopped
    userns_mode: "host"
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      - ./templates-compose:/app/templates-compose:ro
      - ${HOST_HOME_ROOT:-/home}:/host-home
      - ${HOST_PROJECT_ROOT:-/opt/docker-hosting-panel}:${HOST_PROJECT_ROOT:-/opt/docker-hosting-panel}
    labels:
      - traefik.enable=true
      - traefik.docker.network=hosting-public
      - traefik.http.routers.hosting-panel-web.rule=Host(`${PANEL_DOMAIN}`)
      - traefik.http.routers.hosting-panel-web.entrypoints=web
      - traefik.http.routers.hosting-panel-web.middlewares=hosting-panel-https-redirect
      - traefik.http.middlewares.hosting-panel-https-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.hosting-panel-https-redirect.redirectscheme.permanent=true
      - traefik.http.routers.hosting-panel.rule=Host(`${PANEL_DOMAIN}`)
      - traefik.http.routers.hosting-panel.entrypoints=websecure
      - traefik.http.routers.hosting-panel.tls=true
      - traefik.http.routers.hosting-panel.tls.certresolver=letsencrypt
      - traefik.http.services.hosting-panel.loadbalancer.server.port=8000
    networks:
      - hosting-public

  sftp:
    image: atmoz/sftp:alpine
    container_name: hosting-sftp
    restart: unless-stopped
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    ports:
      - "${SFTP_PORT:-2222}:22"
    volumes:
      - ${HOST_HOME_ROOT:-/home}:/home
      - ./data/sftp/users.conf:/etc/sftp/users.conf:ro
      - ./data/sftp/ssh_host_ed25519_key:/etc/ssh/ssh_host_ed25519_key:ro
      - ./data/sftp/ssh_host_rsa_key:/etc/ssh/ssh_host_rsa_key:ro
    networks:
      - hosting-public

  notfound:
    image: nginx:1.27-alpine
    container_name: hosting-notfound
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - NET_RAW
    tmpfs:
      - /var/cache/nginx
      - /var/run
    volumes:
      - ./fallback-404/index.html:/usr/share/nginx/html/index.html:ro
      - ./fallback-404/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/static/404-background.png:/usr/share/nginx/html/404-background.png:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=hosting-public
      - traefik.http.routers.hosting-notfound-web.rule=HostRegexp(`${FALLBACK_HOST_REGEXP:-.+}`)
      - traefik.http.routers.hosting-notfound-web.entrypoints=web
      - traefik.http.routers.hosting-notfound-web.priority=1
      - traefik.http.routers.hosting-notfound-websecure.rule=HostRegexp(`${FALLBACK_HOST_REGEXP:-.+}`)
      - traefik.http.routers.hosting-notfound-websecure.entrypoints=websecure
      - traefik.http.routers.hosting-notfound-websecure.tls=true
      - traefik.http.routers.hosting-notfound-websecure.priority=1
      - traefik.http.services.hosting-notfound.loadbalancer.server.port=80
    networks:
      - hosting-public

networks:
  hosting-public:
    name: ${PUBLIC_NETWORK:-hosting-public}
